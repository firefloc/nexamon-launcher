<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">NEXAMON v0.20 - Cardinal meridians N-S and E-W</title>
  <desc id="desc">NEXAMON: Nexus d'EXplorateurs de l'Aether et des MONdes Anciens.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1b24"/>
      <stop offset="1" stop-color="#193140"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7be4d7"/>
      <stop offset="1" stop-color="#36ac9f"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ad0c2"/>
      <stop offset="1" stop-color="#2b9c90"/>
    </linearGradient>
    <linearGradient id="ambTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8b2"/>
      <stop offset="1" stop-color="#e4cb3e"/>
    </linearGradient>
    <linearGradient id="ambLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#efd95a"/>
      <stop offset="1" stop-color="#9b7b18"/>
    </linearGradient>
    <linearGradient id="ambRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8c247"/>
      <stop offset="1" stop-color="#6f5d11"/>
    </linearGradient>
    <radialGradient id="beastSphereGrad" cx="34%" cy="30%" r="72%">
      <stop offset="0" stop-color="#5da4ff"/>
      <stop offset="0.55" stop-color="#2f6fdb"/>
      <stop offset="1" stop-color="#163d8e"/>
    </radialGradient>
    <linearGradient id="beastFinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe684"/>
      <stop offset="1" stop-color="#d8a22c"/>
    </linearGradient>
    <clipPath id="beastClip14">
      <circle r="33.5"/>
    </clipPath>
    <filter id="titleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#021218" flood-opacity="0.75"/>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#020506" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1400" height="500" rx="28" fill="url(#bg)"/>
  <rect x="12" y="12" width="1376" height="476" rx="24" fill="none" stroke="#355364" stroke-width="2"/>

  <g transform="translate(185 250)" filter="url(#shadow)">
    <polygon points="0,-122 106,-61 106,61 0,122 -106,61 -106,-61" fill="#10242e" stroke="url(#edge)" stroke-width="10"/>

    <!-- Orbit layer behind to build 3D spherical depth -->
    <g opacity="0.34">
      <ellipse rx="142" ry="46" fill="none" stroke="#56dccf" stroke-width="5.2" transform="rotate(-14)"/>
      <ellipse rx="66" ry="140" fill="none" stroke="#58d6cd" stroke-width="5.2" transform="rotate(20)"/>
      <ellipse rx="66" ry="140" fill="none" stroke="#35b1a7" stroke-width="4.6" transform="rotate(-20)"/>
    </g>

    <!-- Vectorized Ambrosium-style block, front top corner anchored at emblem center -->
    <g>
      <polygon points="0,-72 78,-36 0,0 -78,-36" fill="url(#ambTop)" stroke="#fff8df" stroke-width="3"/>
      <polygon points="-78,-36 0,0 0,92 -78,56" fill="url(#ambLeft)" stroke="#f8e171" stroke-width="3"/>
      <polygon points="78,-36 0,0 0,92 78,56" fill="url(#ambRight)" stroke="#66540f" stroke-width="3"/>

      <polygon points="0,-62 64,-33 0,-6 -64,-33" fill="none" stroke="#fff8cf" stroke-width="4" opacity="0.62"/>
      <polygon points="0,-48 50,-30 0,-12 -50,-30" fill="none" stroke="#fff8cf" stroke-width="4" opacity="0.48"/>

      <polygon points="-66,-34 -6,-6 -6,64 -66,38" fill="none" stroke="#f8e46f" stroke-width="4" opacity="0.5"/>
      <polygon points="66,-34 6,-6 6,64 66,38" fill="none" stroke="#ccb038" stroke-width="4" opacity="0.5"/>

      <rect x="-14" y="-57" width="10" height="8" fill="#fff7d9"/>
      <rect x="-2" y="-52" width="10" height="8" fill="#f8f1d0"/>
      <rect x="10" y="-46" width="10" height="8" fill="#fff7d9"/>
      <rect x="-24" y="-43" width="9" height="7" fill="#f6efcc"/>
      <rect x="22" y="-40" width="9" height="7" fill="#f6efcc"/>

      <rect x="-56" y="-5" width="9" height="8" fill="#fff8d6" opacity="0.95"/>
      <rect x="-44" y="4" width="9" height="8" fill="#f8efbf" opacity="0.92"/>
      <rect x="-31" y="13" width="9" height="8" fill="#fff8d6" opacity="0.92"/>
      <rect x="-18" y="22" width="9" height="8" fill="#f8efbf" opacity="0.9"/>

      <rect x="47" y="-2" width="8" height="8" fill="#e5d585" opacity="0.7"/>
      <rect x="35" y="8" width="8" height="8" fill="#dbc76d" opacity="0.66"/>
      <rect x="23" y="18" width="8" height="8" fill="#ccb85a" opacity="0.64"/>
      <rect x="11" y="28" width="8" height="8" fill="#c5b054" opacity="0.62"/>
    </g>

    <!-- Pixelated compass rose -->
    <g transform="scale(1.16)">
      <rect x="-5" y="-86" width="10" height="10" fill="#8a5a33"/>
      <rect x="-9" y="-76" width="18" height="10" fill="#8a5a33"/>
      <rect x="-13" y="-66" width="26" height="10" fill="#8a5a33"/>
      <rect x="-5" y="-56" width="10" height="56" fill="#8a5a33"/>

      <rect x="-5" y="0" width="10" height="56" fill="#8a5a33"/>
      <rect x="-13" y="56" width="26" height="10" fill="#8a5a33"/>
      <rect x="-9" y="66" width="18" height="10" fill="#8a5a33"/>
      <rect x="-5" y="76" width="10" height="10" fill="#8a5a33"/>

      <rect x="-86" y="-5" width="10" height="10" fill="#6e4322"/>
      <rect x="-76" y="-9" width="10" height="18" fill="#6e4322"/>
      <rect x="-66" y="-13" width="10" height="26" fill="#6e4322"/>
      <rect x="-56" y="-5" width="56" height="10" fill="#6e4322"/>

      <rect x="0" y="-5" width="56" height="10" fill="#6e4322"/>
      <rect x="56" y="-13" width="10" height="26" fill="#6e4322"/>
      <rect x="66" y="-9" width="10" height="18" fill="#6e4322"/>
      <rect x="76" y="-5" width="10" height="10" fill="#6e4322"/>
    </g>

    <!-- Beast Ball vector (opaque sphere, hidden meridian backs) -->
    <g>
      <circle r="33.5" fill="url(#beastSphereGrad)" stroke="#0b1a3b" stroke-width="4"/>

      <g clip-path="url(#beastClip14)" fill="none" stroke="#86e2ff" stroke-linecap="round">
        <!-- 5 concentric parallels -->
        <circle r="6" stroke-width="1.9" opacity="0.88"/>
        <circle r="12" stroke-width="1.9" opacity="0.86"/>
        <circle r="18" stroke-width="1.9" opacity="0.85"/>
        <circle r="24" stroke-width="1.9" opacity="0.83"/>
        <circle r="30" stroke-width="1.9" opacity="0.81"/>
        <!-- 2 cardinal meridians at 90 degrees -->
        <line x1="0" y1="-31" x2="0" y2="31" stroke-width="2.8" opacity="0.95"/>
        <line x1="-31" y1="0" x2="31" y2="0" stroke-width="2.8" opacity="0.95"/>
      </g>

      <!-- four golden fins between meridians (reworked to match base model style) -->
      <g stroke-linejoin="round">
        <g transform="rotate(45)">
          <path d="M 0 -46 L 12 -35 L 8 -23 L 0 -28 L -8 -23 L -12 -35 Z" fill="url(#beastFinGrad)" stroke="#7f5e10" stroke-width="1.8"/>
          <path d="M 0 -42 L 8 -34 L 5 -27 L 0 -30 L -5 -27 L -8 -34 Z" fill="#f7dc79" stroke="#b7871f" stroke-width="1.1" opacity="0.9"/>
        </g>
        <g transform="rotate(135)">
          <path d="M 0 -46 L 12 -35 L 8 -23 L 0 -28 L -8 -23 L -12 -35 Z" fill="url(#beastFinGrad)" stroke="#7f5e10" stroke-width="1.8"/>
          <path d="M 0 -42 L 8 -34 L 5 -27 L 0 -30 L -5 -27 L -8 -34 Z" fill="#f7dc79" stroke="#b7871f" stroke-width="1.1" opacity="0.9"/>
        </g>
        <g transform="rotate(225)">
          <path d="M 0 -46 L 12 -35 L 8 -23 L 0 -28 L -8 -23 L -12 -35 Z" fill="url(#beastFinGrad)" stroke="#7f5e10" stroke-width="1.8"/>
          <path d="M 0 -42 L 8 -34 L 5 -27 L 0 -30 L -5 -27 L -8 -34 Z" fill="#f7dc79" stroke="#b7871f" stroke-width="1.1" opacity="0.9"/>
        </g>
        <g transform="rotate(315)">
          <path d="M 0 -46 L 12 -35 L 8 -23 L 0 -28 L -8 -23 L -12 -35 Z" fill="url(#beastFinGrad)" stroke="#7f5e10" stroke-width="1.8"/>
          <path d="M 0 -42 L 8 -34 L 5 -27 L 0 -30 L -5 -27 L -8 -34 Z" fill="#f7dc79" stroke="#b7871f" stroke-width="1.1" opacity="0.9"/>
        </g>
      </g>

      <!-- visible front pole button -->
      <circle r="11" fill="#ffffff" stroke="#0b1a3b" stroke-width="3"/>
      <circle r="4.8" fill="#d9e7ff" stroke="#0b1a3b" stroke-width="1.8"/>
      <circle cx="-3.2" cy="-3.2" r="2.4" fill="#ffffff" opacity="0.82"/>
    </g>

    <!-- Foreground orbit arcs so some parts pass in front and others behind -->
    <g opacity="0.9">
      <path d="M -142 0 A 142 46 0 0 1 142 0" fill="none" stroke="#69e5d9" stroke-width="5.8" transform="rotate(-14)"/>
      <path d="M 0 -140 A 66 140 0 0 1 0 140" fill="none" stroke="#66e2d8" stroke-width="5.8" transform="rotate(20)"/>
      <path d="M 0 -140 A 66 140 0 0 0 0 140" fill="none" stroke="#42c3b8" stroke-width="5.1" transform="rotate(-20)"/>
      <rect x="126" y="-24" width="10" height="10" fill="#e98a45"/>
      <rect x="-133" y="32" width="10" height="10" fill="#2d9b8f"/>
      <rect x="8" y="118" width="10" height="10" fill="#c64839"/>
    </g>
  </g>

  <g transform="translate(350 0)">
    <text x="0" y="226" font-family="'Fira Sans Compressed', 'Trebuchet MS', 'DejaVu Sans', sans-serif" font-size="176" font-weight="900" letter-spacing="4" stroke="#102a31" stroke-width="4" paint-order="stroke" filter="url(#titleShadow)">
      <tspan fill="#4ac4b2">NEX</tspan>
      <tspan dx="24" fill="#e0b14d">A</tspan>
      <tspan dx="24" fill="#d95b47">MON</tspan>
    </text>

    <text x="2" y="300" font-family="'Noto Sans Mono', 'DejaVu Sans Mono', monospace" font-size="27" font-weight="800" fill="#d8e7e4" letter-spacing="0.2">
      Nexus d'explorateurs de l'Aether et des mondes anciens
    </text>

    <line x1="0" y1="338" x2="980" y2="338" stroke="#355d66" stroke-width="2"/>

    <g transform="translate(0 354)">
      <rect x="0" y="0" width="158" height="34" rx="10" fill="#1b323e" stroke="#396a73" stroke-width="2"/>
      <text x="79" y="23" text-anchor="middle" font-family="'Noto Sans Mono', 'DejaVu Sans Mono', monospace" font-size="15" font-weight="700" fill="#bce0da">EXPLORATION</text>

      <rect x="176" y="0" width="158" height="34" rx="10" fill="#1b323e" stroke="#396a73" stroke-width="2"/>
      <text x="255" y="23" text-anchor="middle" font-family="'Noto Sans Mono', 'DejaVu Sans Mono', monospace" font-size="15" font-weight="700" fill="#bce0da">DIMENSIONS</text>

      <rect x="352" y="0" width="130" height="34" rx="10" fill="#1b323e" stroke="#396a73" stroke-width="2"/>
      <text x="417" y="23" text-anchor="middle" font-family="'Noto Sans Mono', 'DejaVu Sans Mono', monospace" font-size="15" font-weight="700" fill="#bce0da">SEMI-RP</text>

      <rect x="500" y="0" width="110" height="34" rx="10" fill="#1b323e" stroke="#396a73" stroke-width="2"/>
      <text x="555" y="23" text-anchor="middle" font-family="'Noto Sans Mono', 'DejaVu Sans Mono', monospace" font-size="15" font-weight="700" fill="#bce0da">MODDE</text>
    </g>
  </g>
</svg>
